                        "text": "Java Hub Academy runs live cohorts in Core Java, Spring Boot, System Design, AWS and DSA — capped at 10 students per batch with senior mentors. Join from the studio or online from anywhere."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What makes Java Hub Academy different?",

                        "@type": "Answer",

                    }
                },
                {
                    "@type": "Question",
                    "name": "Where is your studio, and can I join online?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Our studio is at Near Masjid Aman, Kela Nagar, Aligarh, Uttar Pradesh 202001 (Mon–Sat, 7–8 PM IST). Live online seats are open to learners across India and worldwide — same mentors, projects and feedback."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What is the fee for the Java course?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Fees vary by course and batch. Contact us at +91 70606 49647 or WhatsApp for current fees and payment options. Flexible plans are available for students."
                    }
                },
                {
                    "@type": "Question",
                    "name": "What courses do you offer?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Nine courses: Core Java (10 weeks), Data Structures & Algorithms (12 weeks), Databases (6 weeks), REST API Design with Spring Boot (4 weeks), System Design (8 weeks), AWS Cloud (6 weeks), CI/CD (3 weeks), Interview Preparation (8 weeks), and Job Search & Resume (2 weeks)."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Can complete beginners join?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Yes. Core Java starts from first principles — no prior programming experience required. Many successful students began with zero coding background."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Do you help with jobs after training?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "We make you job-ready — not job-dependent. Training includes career guidance, resume reviews and mock interviews. Students crack interviews at top companies on their own merit because they are genuinely prepared."
                    }
                },
                {
                    "@type": "Question",
                    "name": "Why only 10 students per batch?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Small batches mean individual attention, personal assignment reviews, and real progress tracking. Mass education does not work for skill-based learning."
                    }
                }
